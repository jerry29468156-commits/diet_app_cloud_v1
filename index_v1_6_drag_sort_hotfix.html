<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>飲食紀錄 App｜正式雲端版 v1.6</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./app_config.js?v=1.6.0"></script>
<style>
:root{--bg:#f6f7fb;--card:#fff;--txt:#172033;--mut:#6b7280;--line:#e5e7eb;--pri:#2563eb;--bad:#dc2626;--ok:#16a34a;--warn:#f59e0b}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif}header{background:#fff;border-bottom:1px solid var(--line);padding:8px 12px;position:sticky;top:0;z-index:9}h1{font-size:16px;margin:0;font-weight:900}.topbar{display:flex;align-items:center;justify-content:space-between;gap:8px}.sync{font-size:12px;color:#166534;background:#dcfce7;border-radius:999px;padding:4px 8px}.small{font-size:12px;color:var(--mut);line-height:1.45}main{max-width:1100px;margin:auto;padding:8px 10px 145px}.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:14px;margin:10px 0;box-shadow:0 3px 12px #0000000a}h2{font-size:18px;margin:0 0 10px}.row{display:flex;gap:10px;align-items:center}.between{justify-content:space-between}.wrap{flex-wrap:wrap}.grid{display:grid;gap:10px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}label{display:block;font-size:12px;color:var(--mut);margin-bottom:5px}input,select,textarea,button{font:inherit}input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:12px;background:#fff}textarea{min-height:72px}button{border:0;border-radius:13px;background:var(--pri);color:#fff;font-weight:800;padding:10px 12px;white-space:nowrap}button.sec{background:#e5e7eb;color:#111827}button.dan{background:#fee2e2;color:#991b1b}button:disabled{opacity:.45}.actions{display:flex;gap:8px;flex-wrap:wrap}.actions button{flex:1}.tabs{position:fixed;left:0;right:0;bottom:0;z-index:30;background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);padding-bottom:env(safe-area-inset-bottom)}.tab{text-align:center;padding:8px 2px;color:var(--mut);font-size:12px}.tab.active{background:#eff6ff;color:var(--pri);font-weight:900}.tab b{display:block;font-size:18px}.metric{border:1px solid var(--line);border-radius:14px;background:#fafafa;padding:10px}.metric .v{font-size:20px;font-weight:900}.bar{height:9px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:8px}.fill{height:100%;background:var(--pri)}.fill.over{background:var(--bad)}.item{min-height:74px;border-bottom:1px solid var(--line);display:flex;gap:10px;justify-content:space-between;align-items:center;padding:8px 0;overflow:hidden}.info{min-width:0;flex:1}.name{font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta{font-size:12px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.tagline{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.pill{display:inline-block;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:800;background:#eef2ff;color:#3730a3;margin:2px}.pill.ok{background:#dcfce7;color:#166534}.pill.warn{background:#fef3c7;color:#92400e}.pill.bad{background:#fee2e2;color:#991b1b}.pill.green{background:#ecfdf5;color:#166534}.qty{display:inline-flex;min-width:56px;justify-content:center;padding:6px 10px;border-radius:999px;background:#dbeafe;color:#1d4ed8;font-weight:900;margin-right:6px}.hide{display:none!important}.empty{text-align:center;color:var(--mut);padding:16px}.sheet{position:fixed;left:10px;right:10px;bottom:70px;z-index:20;background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:0 12px 36px #0003;padding:12px;max-width:900px;margin:auto}.sheetgrid{display:grid;grid-template-columns:1fr 88px 74px;gap:8px;align-items:end}.close{position:absolute;right:10px;top:8px;background:#f3f4f6;color:#111827;padding:4px 8px}.chart{border:1px solid var(--line);border-radius:16px;background:#fff;padding:8px}.svg{width:100%;height:280px}.axisText{font-size:11px;fill:#6b7280}.gridLine{stroke:#e5e7eb}.axisLine{stroke:#9ca3af}.dataLine{fill:none;stroke:#2563eb;stroke-width:3}.avgLine{fill:none;stroke:#f59e0b;stroke-width:2;stroke-dasharray:5 5}.targetLine{fill:none;stroke:#6b7280;stroke-width:2;stroke-dasharray:3 4}.point{fill:#2563eb;stroke:#fff;stroke-width:2}.miss{fill:#d1d5db}.table{width:100%;border-collapse:collapse;font-size:13px}.table th,.table td{border-bottom:1px solid var(--line);padding:8px;white-space:nowrap;text-align:left}.scroll{overflow:auto}.hint{background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe;border-radius:12px;padding:10px;font-size:13px;line-height:1.5}.err{display:none;background:#fef2f2;color:#991b1b;border:1px solid #fecaca;border-radius:12px;padding:10px;margin:10px 0}.dashboardControls{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}.dragHandle{width:34px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:12px;background:#f3f4f6;color:#6b7280;font-size:20px;font-weight:900;cursor:grab;touch-action:none;user-select:none;flex-shrink:0}.food-row.dragging{opacity:.4}.food-row.drop-target{outline:2px dashed var(--pri);outline-offset:-3px;border-radius:12px}.compactActions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}.compactActions button{padding:8px 10px}@media(max-width:640px){header{padding:6px 10px}h1{font-size:14px}.g4,.g3,.g2,.dashboardControls{grid-template-columns:1fr}.svg{height:240px}.sheet{bottom:64px;left:8px;right:8px;padding:12px}.sheetgrid{grid-template-columns:1fr 72px 68px;gap:6px}.card{padding:12px;margin:8px 0}.actions button{padding:10px 8px}.metric .v{font-size:18px}.compactActions{justify-content:flex-start}.compactActions button{font-size:13px;padding:8px 10px}.dragHandle{height:52px;width:36px}}
</style>
</head>
<body>
<header><div class="topbar"><h1>飲食紀錄 App</h1><div class="row"><span id="syncState" class="sync">未登入</span><button id="logoutBtn" class="sec hide">登出</button></div></div></header>
<main><div id="err" class="err"></div>
<section id="authPage" class="card"><h2>登入 / 註冊</h2><div class="grid g2"><div><label>Email</label><input id="authEmail" type="email"></div><div><label>密碼</label><input id="authPassword" type="password"></div></div><div class="actions" style="margin-top:10px"><button id="loginBtn">登入</button><button id="signupBtn" class="sec">註冊</button></div></section>
<section id="appPage" class="hide">
<section id="page-dashboard" class="page">
<div class="card"><div class="row between"><h2>今日儀表板</h2><span id="targetName" class="pill"></span></div><div class="dashboardControls"><div><label>日期</label><input id="dateInput" type="date"></div><div><label>目標日型</label><select id="dayTypeSelect"></select></div></div><div id="metrics" class="grid g4"></div><div class="actions" style="margin-top:10px"><button id="copyYesterdayBtn" class="sec">複製昨日飲食</button><button id="clearTodayBtn" class="dan">清空今日</button></div></div>
<div class="card"><h2>今日紀錄</h2><div id="todayLogs"></div></div>
<div class="card"><h2>今日身體紀錄</h2><div class="grid g3"><div><label>體重 kg</label><input id="bodyWeight" type="number" inputmode="decimal" step="0.1"></div><div><label>訓練類型</label><select id="trainingType"></select></div><div><label>飢餓感 1-5</label><input id="hungerScore" type="number" inputmode="numeric" min="1" max="5" step="1"></div></div><label style="margin-top:10px">備註</label><textarea id="bodyNote"></textarea><div class="actions" style="margin-top:10px"><button id="saveBodyBtn">儲存身體紀錄</button></div></div>
</section>
<section id="page-add" class="page hide"><div class="card"><div class="row between"><h2>常用組合</h2><span class="small">一鍵加入今日</span></div><div id="comboListQuick"></div></div><div class="card"><h2>新增飲食紀錄</h2><div class="grid g3"><div><label>搜尋食材</label><input id="foodSearch" placeholder="例如：豆漿、鮪魚、雞胸肉"></div><div><label>標籤篩選</label><select id="tagFilter"></select></div><div><label>常用</label><select id="favoriteFilter"><option value="">全部食材</option><option value="fav">只看常用</option></select></div></div><div id="foodResults"></div></div></section>
<section id="page-history" class="page hide"><div class="card"><h2>長期追蹤</h2><div id="historySummary" class="grid g4"></div></div><div class="card"><div class="row between wrap"><h2 id="trendTitle">趨勢圖</h2><div class="row wrap"><div><label>區間</label><select id="historyRange"><option value="7">最近 7 日</option><option value="14">最近 14 日</option><option value="30">最近 30 日</option><option value="90">最近 90 日</option></select></div><div><label>趨勢指標</label><select id="trendMetric"><option value="kcal">熱量 kcal</option><option value="protein">蛋白質 g</option><option value="carbs">碳水 g</option><option value="fat">脂肪 g</option><option value="weight">體重 kg</option><option value="hunger">飢餓感</option></select></div></div></div><div class="chart"><svg id="lineChart" class="svg" viewBox="0 0 760 300" preserveAspectRatio="none"></svg></div><div id="chartNote" class="small" style="margin-top:8px"></div></div><div class="card"><h2>每日摘要</h2><div class="scroll"><table class="table"><thead><tr><th>日期</th><th>日型</th><th>熱量</th><th>蛋白</th><th>體重</th><th>飢餓感</th><th>訓練</th><th>狀態</th></tr></thead><tbody id="historyRows"></tbody></table></div></div><div class="card"><h2>達標追蹤</h2><div id="complianceSummary"></div></div></section>
<section id="page-foods" class="page hide"><div class="card"><h2>食材庫</h2><input id="editingFoodId" type="hidden"><div class="grid g2"><div><label>名稱</label><input id="fName"></div><div><label>單位</label><input id="fUnit" placeholder="一份"></div><div><label>熱量 kcal</label><input id="fKcal" type="number" inputmode="decimal" step="0.01"></div><div><label>蛋白質 g</label><input id="fProtein" type="number" inputmode="decimal" step="0.01"></div><div><label>碳水 g</label><input id="fCarbs" type="number" inputmode="decimal" step="0.01"></div><div><label>脂肪 g</label><input id="fFat" type="number" inputmode="decimal" step="0.01"></div></div><label style="margin-top:10px">標籤</label><div id="foodTagChecks"></div><label class="pill" style="margin-top:10px"><input id="fFavorite" type="checkbox"> 設為常用</label><div class="actions" style="margin-top:10px"><button id="saveFoodBtn">新增 / 更新</button><button id="clearFoodBtn" class="sec">清空</button></div></div><div class="card"><div class="row between"><h2>食材清單</h2><span id="foodCount" class="small"></span></div><div class="small" style="margin-bottom:8px">按住左側 ≡ 拖曳即可調整排序</div><input id="foodManageSearch" placeholder="搜尋食材 / 標籤"><div id="foodList"></div></div></section>
<section id="page-settings" class="page hide"><div class="card"><h2>雲端狀態</h2><div id="cloudStatus" class="hint"></div></div><div class="card"><h2>達標規則</h2><div class="grid g2"><div><label>熱量誤差 kcal</label><input id="ruleKcalAbs" type="number" inputmode="decimal"></div><div><label>熱量誤差 %</label><input id="ruleKcalPct" type="number" inputmode="decimal"></div><div><label>蛋白質下限 %</label><input id="ruleProteinPct" type="number" inputmode="decimal"></div><div><label>碳水誤差 %</label><input id="ruleCarbsPct" type="number" inputmode="decimal"></div><div><label>脂肪上限 %</label><input id="ruleFatPct" type="number" inputmode="decimal"></div></div><div class="actions" style="margin-top:10px"><button id="saveRulesBtn">儲存規則</button></div></div><div class="card"><h2>訓練類型</h2><div class="row"><input id="newTrainingType" placeholder="例：重訓、攀岩、休息"><button id="addTrainingTypeBtn">新增</button></div><div id="trainingTypeList"></div></div><div class="card"><h2>飲食目標</h2><select id="targetEdit"></select><div class="grid g2" style="margin-top:10px"><div><label>名稱</label><input id="tName"></div><div><label>蛋白質</label><input id="tProtein" type="number" inputmode="decimal"></div><div><label>碳水</label><input id="tCarbs" type="number" inputmode="decimal"></div><div><label>脂肪</label><input id="tFat" type="number" inputmode="decimal"></div><div><label>熱量</label><input id="tKcal" readonly></div></div><div class="actions" style="margin-top:10px"><button id="saveTargetBtn">儲存</button><button id="newTargetBtn" class="sec">新增</button><button id="deleteTargetBtn" class="dan">刪除</button></div></div><div class="card"><h2>標籤管理</h2><div class="row"><input id="newTagName" placeholder="例如：便利商店、蛋白質"><button id="addTagBtn">新增</button></div><div id="tagList"></div></div><div class="card"><h2>常用組合</h2><label>組合名稱</label><input id="comboName" placeholder="例：便利商店高蛋白晚餐"><div class="grid g2" style="margin-top:10px"><div><label>食材</label><select id="comboFood"></select></div><div><label>份數</label><input id="comboQty" type="number" inputmode="decimal" step="0.25" value="1"></div></div><div class="actions" style="margin-top:10px"><button id="addComboItemBtn" class="sec">加入食材</button><button id="saveComboBtn">儲存組合</button><button id="clearComboDraftBtn" class="dan">清空草稿</button></div><div id="comboDraftList"></div><div class="actions" style="margin-top:10px"><button id="createComboFromTodayBtn" class="sec">用今日紀錄建立組合</button></div><div id="comboListSettings"></div></div><div class="card"><h2>資料匯出 / 匯入</h2><div class="actions"><button id="exportBtn">匯出 JSON</button><button id="importBtn" class="sec">匯入 JSON</button></div><input id="importFile" type="file" accept="application/json" class="hide"></div></section>
</section></main>
<div id="quickSheet" class="sheet hide"><button id="closeSheetBtn" class="close">關閉</button><div class="name" id="sheetFoodName"></div><div class="meta" id="sheetFoodMeta"></div><div class="sheetgrid" style="margin-top:8px"><div><label>日期</label><input id="sheetDate" type="date"></div><div><label>份數</label><input id="qtyInput" type="number" inputmode="decimal" step="0.25" value="1"></div><button id="addLogBtn">加入</button></div><div class="actions" style="margin-top:8px"><button class="sec" id="qtyHalfBtn">0.5份</button><button class="sec" id="qtyOneBtn">1份</button><button class="sec" id="qtyTwoBtn">2份</button></div></div>
<nav id="tabs" class="tabs hide"><div class="tab active" data-page="dashboard"><b>◎</b>首頁</div><div class="tab" data-page="add"><b>＋</b>紀錄</div><div class="tab" data-page="history"><b>↗</b>歷程</div><div class="tab" data-page="foods"><b>□</b>食材</div><div class="tab" data-page="settings"><b>⚙</b>設定</div></nav>
<script>
window.onerror=(msg,src,line)=>{const e=document.getElementById('err');if(e){e.style.display='block';e.textContent='程式錯誤：'+msg+'（第 '+line+' 行）'};return false};
const APP_VERSION='1.6.0';const cfg=window.APP_CONFIG||{};const sb=window.supabase.createClient(cfg.SUPABASE_URL,cfg.SUPABASE_ANON_KEY);const $=id=>document.getElementById(id);const num=x=>Number(x||0),round=x=>Math.round(num(x)*100)/100,targetKcal=(p,c,f)=>round(num(p)*4+num(c)*4+num(f)*9),today=()=>new Date().toISOString().slice(0,10),addDays=(d,n)=>{let x=new Date(d+'T00:00:00');x.setDate(x.getDate()+n);return x.toISOString().slice(0,10)};
let session=null,user=null,channel=null,selected=null,comboDraft=[],refreshing=false,editingNewTarget=false,dragFoodId=null,dragOverId=null;let state={foods:[],foodTags:[],tags:[],logs:[],targets:[],metrics:{},trainingTypes:[],templates:[],templateItems:[],rules:{kcalAbs:100,kcalPct:5,proteinPct:90,carbsPct:15,fatPct:110},hasSettings:false,sortOrderReady:true};
function setSync(t){$('syncState').textContent=t}function err(e){console.error(e);alert(e.message||e)}function uid(){return user.id}function table(t){return sb.from(t)}function clampHunger(v){v=num(v);if(!v)return null;return Math.max(1,Math.min(5,Math.round(v)))}function chip(s){return`<span class="pill ${s.cls}">${s.txt}</span>`}function first(data){return Array.isArray(data)?data[0]:data}
async function init(){bind();let r=await sb.auth.getSession();session=r.data.session;user=session?.user||null;await routeAuth();sb.auth.onAuthStateChange(async(_,s)=>{session=s;user=s?.user||null;await routeAuth()})}
function bind(){$('loginBtn').onclick=login;$('signupBtn').onclick=signup;$('logoutBtn').onclick=logout;$('dateInput').value=today();$('sheetDate').value=today();$('dateInput').onchange=()=>{loadBodyForm();renderAll()};$('dayTypeSelect').onchange=saveDailyTarget;$('copyYesterdayBtn').onclick=copyYesterday;$('clearTodayBtn').onclick=clearToday;$('saveBodyBtn').onclick=saveBody;$('hungerScore').onchange=()=>{$('hungerScore').value=clampHunger($('hungerScore').value)||''};$('hungerScore').onblur=()=>{$('hungerScore').value=clampHunger($('hungerScore').value)||''};$('foodSearch').oninput=renderFoodResults;$('tagFilter').onchange=renderFoodResults;$('favoriteFilter').onchange=renderFoodResults;$('foodManageSearch').oninput=renderFoodList;$('historyRange').onchange=renderHistory;$('trendMetric').onchange=renderHistory;$('saveFoodBtn').onclick=saveFood;$('clearFoodBtn').onclick=clearFoodForm;$('targetEdit').onchange=loadTargetForm;$('saveTargetBtn').onclick=saveTarget;$('newTargetBtn').onclick=newTarget;$('deleteTargetBtn').onclick=deleteTarget;$('addTrainingTypeBtn').onclick=addTrainingType;$('addTagBtn').onclick=addTag;$('saveRulesBtn').onclick=saveRules;$('addLogBtn').onclick=addLog;$('closeSheetBtn').onclick=closeSheet;$('qtyHalfBtn').onclick=()=>$('qtyInput').value=.5;$('qtyOneBtn').onclick=()=>$('qtyInput').value=1;$('qtyTwoBtn').onclick=()=>$('qtyInput').value=2;$('addComboItemBtn').onclick=addComboItem;$('saveComboBtn').onclick=saveCombo;$('clearComboDraftBtn').onclick=()=>{comboDraft=[];renderTemplates()};$('createComboFromTodayBtn').onclick=createComboFromToday;$('exportBtn').onclick=exportJson;$('importBtn').onclick=()=>$('importFile').click();$('importFile').onchange=importJson;document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>showPage(t.dataset.page,t));['tProtein','tCarbs','tFat'].forEach(id=>$(id).oninput=()=>{$('tKcal').value=targetKcal($('tProtein').value,$('tCarbs').value,$('tFat').value)})}
async function routeAuth(){if(!user){$('authPage').classList.remove('hide');$('appPage').classList.add('hide');$('tabs').classList.add('hide');$('logoutBtn').classList.add('hide');setSync('未登入');return}$('authPage').classList.add('hide');$('appPage').classList.remove('hide');$('tabs').classList.remove('hide');$('logoutBtn').classList.remove('hide');setSync('同步中');await bootstrap();subscribeRealtime();setSync('已同步')}
async function login(){let {error}=await sb.auth.signInWithPassword({email:$('authEmail').value.trim(),password:$('authPassword').value});if(error)err(error)}async function signup(){let {error}=await sb.auth.signUp({email:$('authEmail').value.trim(),password:$('authPassword').value});if(error)err(error);else alert('已送出註冊；若有啟用信箱驗證，請先到信箱確認。')}async function logout(){await sb.auth.signOut()}
async function bootstrap(){await reloadAll();await seedIfEmpty();await reloadAll();renderAll();loadBodyForm();$('cloudStatus').innerHTML=`目前登入：<b>${user.email}</b><br>使用者 ID：${user.id}<br>App 版本：v${APP_VERSION}<br>資料權限：RLS 依 user_id 隔離。`}
async function reloadAll(){await Promise.all([loadSettings(),loadTargets(),loadTraining(),loadTags(),loadFoods(),loadLogs(),loadMetrics(),loadTemplates()])}
async function loadSettings(){let {data,error}=await table('user_settings').select('*').maybeSingle();if(error)throw error;state.hasSettings=!!data;if(data)state.rules={kcalAbs:data.kcal_abs,kcalPct:data.kcal_pct,proteinPct:data.protein_pct,carbsPct:data.carbs_pct,fatPct:data.fat_pct}}
async function loadTargets(){let {data,error}=await table('diet_targets').select('*').order('created_at');if(error)throw error;state.targets=data||[]}
async function loadTraining(){let {data,error}=await table('training_types').select('*').order('name');if(error)throw error;state.trainingTypes=data||[]}
async function loadTags(){let {data,error}=await table('tags').select('*').order('name');if(error)throw error;state.tags=data||[]}
async function loadFoods(){let f=await table('foods').select('*').order('sort_order',{ascending:true,nullsFirst:false}).order('name');if(f.error){state.sortOrderReady=false;let fb=await table('foods').select('*').order('favorite',{ascending:false}).order('name');if(fb.error)throw fb.error;state.foods=fb.data||[]}else{state.sortOrderReady=true;state.foods=f.data||[]}let ft=await table('food_tags').select('*');if(ft.error)throw ft.error;state.foodTags=ft.data||[]}
async function loadLogs(){let {data,error}=await table('food_logs').select('*').order('log_date',{ascending:false});if(error)throw error;state.logs=data||[]}
async function loadMetrics(){let {data,error}=await table('daily_metrics').select('*');if(error)throw error;state.metrics={};(data||[]).forEach(x=>state.metrics[x.log_date]=x)}
async function loadTemplates(){let {data,error}=await table('meal_templates').select('*').order('created_at');if(error)throw error;state.templates=data||[];let r=await table('meal_template_items').select('*');if(r.error)throw r.error;state.templateItems=r.data||[]}

function renderHistory(){let dates=hDates(),rows=dates.map(d=>({date:d,sum:sums(d),target:currentTarget(d),metric:state.metrics[d]||{},status:evalC(d).overall}));let logged=rows.filter(r=>state.logs.some(l=>l.log_date===r.date)),av=k=>logged.length?round(logged.reduce((a,r)=>a+r.sum[k],0)/logged.length):0,weights=rows.map(r=>num(r.metric.weight)).filter(x=>x>0),avgW=weights.length?round(weights.reduce((a,b)=>a+b,0)/weights.length):0,good=rows.filter(r=>r.status.cls==='ok').length;$('historySummary').innerHTML=[['平均熱量',av('kcal'),'kcal'],['平均蛋白質',av('protein'),'g'],['平均體重',avgW||'-','kg'],['良好天數',good+' / '+dates.length,'天']].map(x=>`<div class="metric"><div class="small">${x[0]}</div><div class="v">${x[1]} <span class="small">${x[2]}</span></div></div>`).join('');renderLine(rows,$('trendMetric').value);renderComplianceSummary(dates);$('historyRows').innerHTML=rows.slice().reverse().map(r=>`<tr><td>${r.date}</td><td>${r.target.name||''}</td><td>${round(r.sum.kcal)}</td><td>${round(r.sum.protein)}</td><td>${r.metric.weight||''}</td><td>${r.metric.hunger||''}</td><td>${state.trainingTypes.find(t=>t.id===r.metric.training_type_id)?.name||''}</td><td>${chip(r.status)}</td></tr>`).join('')}
function renderLine(rows,m){$('trendTitle').textContent=({kcal:'熱量 kcal',protein:'蛋白質 g',carbs:'碳水 g',fat:'脂肪 g',weight:'體重 kg',hunger:'飢餓感'}[m])+' 趨勢';let svg=$('lineChart'),W=760,H=300,L=58,R=18,T=18,B=42,cw=W-L-R,ch=H-T-B,vals=rows.map(r=>mVal(r,m)),targets=['kcal','protein','carbs','fat'].includes(m)?rows.map(r=>r.target[m]):[],dom=yDomain(vals.concat(targets),m),unit={kcal:'kcal',protein:'g',carbs:'g',fat:'g',weight:'kg',hunger:''}[m]||'',x=i=>rows.length<=1?L+cw/2:L+i*(cw/(rows.length-1)),y=v=>T+(dom.max-v)/(dom.max-dom.min)*ch,parts=[`<rect width="${W}" height="${H}" fill="#fff"/>`];dom.ticks.forEach(t=>{let yy=y(t);parts.push(`<line class="gridLine" x1="${L}" y1="${yy}" x2="${W-R}" y2="${yy}"/><text class="axisText" x="${L-8}" y="${yy+4}" text-anchor="end">${round(t)}</text>`)});parts.push(`<line class="axisLine" x1="${L}" y1="${T}" x2="${L}" y2="${H-B}"/><line class="axisLine" x1="${L}" y1="${H-B}" x2="${W-R}" y2="${H-B}"/>`);rows.forEach((r,i)=>{if(i===0||i===rows.length-1||rows.length<=14||i%Math.ceil(rows.length/6)===0)parts.push(`<text class="axisText" x="${x(i)}" y="${H-18}" text-anchor="middle">${r.date.slice(5)}</text>`)});let pts=vals.map((v,i)=>v==null?null:[x(i),y(v)]).filter(Boolean);if(pts.length>1)parts.push(`<path class="dataLine" d="${pts.map((p,i)=>(i?'L':'M')+p[0]+','+p[1]).join(' ')}"/>`);let av=avg(vals).map((v,i)=>v==null?null:[x(i),y(v)]).filter(Boolean);if(m!=='hunger'&&av.length>1)parts.push(`<path class="avgLine" d="${av.map((p,i)=>(i?'L':'M')+p[0]+','+p[1]).join(' ')}"/>`);if(targets.length)parts.push(`<path class="targetLine" d="${targets.map((v,i)=>(i?'L':'M')+x(i)+','+y(v)).join(' ')}"/>`);vals.forEach((v,i)=>parts.push(v==null?`<circle class="miss" cx="${x(i)}" cy="${H-B}" r="3"/>`:`<circle class="point" cx="${x(i)}" cy="${y(v)}" r="4"/>`));svg.innerHTML=parts.join('');$('chartNote').textContent=`Y 軸範圍：${round(dom.min)} ～ ${round(dom.max)}${unit?' '+unit:''}，刻度間距約 ${round(dom.step)}${unit?' '+unit:''}`}
function renderComplianceSummary(dates=hDates()){let keys=[['kcal','熱量'],['protein','蛋白質'],['carbs','碳水'],['fat','脂肪']],cards=keys.map(([k,n])=>`<div class="metric"><div class="small">${n}達標率</div><div class="v">${dates.filter(d=>evalC(d)[k].cls==='ok').length} / ${dates.length}</div></div>`).join('');let off={kcal:0,protein:0,carbs:0,fat:0};dates.forEach(d=>keys.forEach(([k])=>{if(evalC(d)[k].cls!=='ok')off[k]++}));let top=keys.map(([k,n])=>[n,off[k]]).sort((a,b)=>b[1]-a[1])[0];$('complianceSummary').innerHTML=`<div class="grid g4">${cards}</div><div class="hint" style="margin-top:10px">目前區間最常偏離項目：<b>${top[0]}</b>，共 ${top[1]} 天非達標。</div>`}
async function saveBody(){let d=currentDate(),m=state.metrics[d],row={user_id:uid(),log_date:d,target_id:$('dayTypeSelect').value||currentTarget(d).id,training_type_id:$('trainingType').value||null,weight:num($('bodyWeight').value)||null,hunger:clampHunger($('hungerScore').value),note:$('bodyNote').value.trim()};$('hungerScore').value=row.hunger||'';let q=m?table('daily_metrics').update(row).eq('id',m.id).eq('user_id',uid()):table('daily_metrics').insert(row);let {error}=await q;if(error)return err(error);await afterMutation()}
function loadBodyForm(){let m=state.metrics[currentDate()]||{};$('bodyWeight').value=m.weight||'';$('hungerScore').value=m.hunger||'';$('bodyNote').value=m.note||'';renderTraining();$('trainingType').value=m.training_type_id||''}
function renderTraining(){$('trainingType').innerHTML=state.trainingTypes.map(t=>`<option value="${t.id}">${t.name}</option>`).join('');$('trainingTypeList').innerHTML=state.trainingTypes.map(t=>`<div class="item"><div class="info"><div class="name">${t.name}</div></div><button class="dan" onclick="deleteTraining('${t.id}')">刪除</button></div>`).join('')}
async function addTrainingType(){let name=$('newTrainingType').value.trim();if(!name)return;let {error}=await table('training_types').insert({user_id:uid(),name});if(error)return err(error);$('newTrainingType').value='';await afterMutation()}
async function deleteTraining(id){if(!confirm('確定刪除訓練類型？既有每日紀錄會改為未指定訓練類型。'))return;setSync('刪除中');let u=await table('daily_metrics').update({training_type_id:null}).eq('training_type_id',id).eq('user_id',uid());if(u.error)return err(u.error);let d=await table('training_types').delete().eq('id',id).eq('user_id',uid());if(d.error)return err(d.error);state.trainingTypes=state.trainingTypes.filter(x=>x.id!==id);Object.values(state.metrics).forEach(m=>{if(m.training_type_id===id)m.training_type_id=null});renderAll();await afterMutation()}
async function addTag(){let name=$('newTagName').value.trim();if(!name)return;let {error}=await table('tags').insert({user_id:uid(),name});if(error)return err(error);$('newTagName').value='';await afterMutation()}
function renderTags(){renderFoodTagChecks();$('tagList').innerHTML=state.tags.map(t=>`<div class="item"><div class="info"><span class="pill">${t.name}</span></div><button class="dan" onclick="deleteTag('${t.id}')">刪除</button></div>`).join('')}
async function deleteTag(id){if(!confirm('確定刪除標籤？食材不會被刪除，只會移除此標籤關聯。'))return;setSync('刪除中');let r1=await table('food_tags').delete().eq('tag_id',id).eq('user_id',uid());if(r1.error)return err(r1.error);let r2=await table('tags').delete().eq('id',id).eq('user_id',uid());if(r2.error)return err(r2.error);state.tags=state.tags.filter(x=>x.id!==id);state.foodTags=state.foodTags.filter(x=>x.tag_id!==id);renderAll();await afterMutation()}
function renderTargetEditor(){let cur=$('targetEdit').value;if(editingNewTarget){ensureNewTargetOption();return}$('targetEdit').innerHTML=state.targets.map(t=>`<option value="${t.id}">${t.name}</option>`).join('');$('targetEdit').value=state.targets.some(t=>t.id===cur)?cur:(state.targets[0]?.id||'');loadTargetForm()}
function ensureNewTargetOption(){if(!$('targetEdit').querySelector('option[value="__new__"]'))$('targetEdit').insertAdjacentHTML('afterbegin','<option value="__new__">新增目標</option>');$('targetEdit').value='__new__'}
function loadTargetForm(){if($('targetEdit').value==='__new__')return;editingNewTarget=false;let t=state.targets.find(x=>x.id===$('targetEdit').value);if(!t)return;$('tName').value=t.name;$('tProtein').value=t.protein;$('tCarbs').value=t.carbs;$('tFat').value=t.fat;$('tKcal').value=t.kcal}
async function saveTarget(){let isNew=editingNewTarget||$('targetEdit').value==='__new__';let id=isNew?'':$('targetEdit').value,row={user_id:uid(),name:$('tName').value.trim()||'自訂日',protein:num($('tProtein').value),carbs:num($('tCarbs').value),fat:num($('tFat').value)};let q=id?table('diet_targets').update(row).eq('id',id).eq('user_id',uid()):table('diet_targets').insert(row);let {error}=await q;if(error)return err(error);editingNewTarget=false;await afterMutation()}
function newTarget(){editingNewTarget=true;ensureNewTargetOption();$('tName').value='自訂日';$('tProtein').value=170;$('tCarbs').value=180;$('tFat').value=55;$('tKcal').value=targetKcal(170,180,55)}
async function deleteTarget(){let id=$('targetEdit').value;if(!id||id==='__new__')return;if(state.targets.length<=1)return alert('至少需要保留一個飲食目標');if(!confirm('確定刪除？使用此目標的每日紀錄會改為未指定目標。'))return;setSync('刪除中');let u=await table('daily_metrics').update({target_id:null}).eq('target_id',id).eq('user_id',uid());if(u.error)return err(u.error);let d=await table('diet_targets').delete().eq('id',id).eq('user_id',uid());if(d.error)return err(d.error);state.targets=state.targets.filter(x=>x.id!==id);Object.values(state.metrics).forEach(m=>{if(m.target_id===id)m.target_id=null});renderAll();await afterMutation()}
function renderRules(){let r=state.rules;$('ruleKcalAbs').value=r.kcalAbs;$('ruleKcalPct').value=r.kcalPct;$('ruleProteinPct').value=r.proteinPct;$('ruleCarbsPct').value=r.carbsPct;$('ruleFatPct').value=r.fatPct}
async function saveRules(){let row={user_id:uid(),kcal_abs:num($('ruleKcalAbs').value)||100,kcal_pct:num($('ruleKcalPct').value)||5,protein_pct:num($('ruleProteinPct').value)||90,carbs_pct:num($('ruleCarbsPct').value)||15,fat_pct:num($('ruleFatPct').value)||110};let {error}=await table('user_settings').upsert(row);if(error)return err(error);await afterMutation()}
function renderTemplates(){if($('comboFood'))$('comboFood').innerHTML=sortedFoods().map(f=>`<option value="${f.id}">${f.name}｜${f.unit}</option>`).join('');$('comboDraftList').innerHTML=comboDraft.length?comboDraft.map((it,i)=>{let f=state.foods.find(x=>x.id===it.food_id);return`<div class="item"><div class="info"><div class="name">${f?f.name:'已刪除'}</div><div class="meta">${it.qty} 份</div></div><button class="dan" onclick="removeComboDraftItem(${i})">移除</button></div>`}).join(''):'<div class="empty">尚未加入食材到組合草稿</div>';let html=state.templates.map(t=>{let items=state.templateItems.filter(i=>i.template_id===t.id).filter(i=>state.foods.some(f=>f.id===i.food_id)),meta=items.map(i=>`${state.foods.find(f=>f.id===i.food_id)?.name||'已刪除'} × ${i.qty}`).join('、');return`<div class="item"><div class="info"><div class="name">${t.name}</div><div class="meta">${meta||'此組合內沒有有效食材'}</div></div><div class="row"><button onclick="addTemplateToDate('${t.id}')">加入</button><button class="dan" onclick="deleteTemplate('${t.id}')">刪除</button></div></div>`}).join('')||'<div class="empty">尚未建立常用組合</div>';$('comboListQuick').innerHTML=html;$('comboListSettings').innerHTML='<h2 style="margin-top:14px">已建立組合</h2>'+html}
function addComboItem(){let fid=$('comboFood').value,qty=num($('comboQty').value)||1;if(!state.foods.some(f=>f.id===fid))return alert('請選擇有效食材');comboDraft.push({food_id:fid,qty});renderTemplates()}
function removeComboDraftItem(i){comboDraft.splice(i,1);renderTemplates()}
async function saveCombo(){let name=$('comboName').value.trim(),validDraft=comboDraft.filter(i=>state.foods.some(f=>f.id===i.food_id));if(!name||!validDraft.length)return alert('請輸入組合名稱並加入有效食材');let ins=await table('meal_templates').insert({user_id:uid(),name}).select();if(ins.error)return err(ins.error);let tpl=first(ins.data);if(!tpl)return alert('常用組合建立失敗，資料庫沒有回傳結果');let rows=validDraft.map(i=>({user_id:uid(),template_id:tpl.id,food_id:i.food_id,qty:i.qty}));let r=await table('meal_template_items').insert(rows);if(r.error)return err(r.error);comboDraft=[];$('comboName').value='';await afterMutation()}
async function createComboFromToday(){let name=$('comboName').value.trim()||currentDate()+' 飲食組合',logs=state.logs.filter(l=>l.log_date===currentDate()).filter(l=>state.foods.some(f=>f.id===l.food_id));if(!logs.length)return alert('今日沒有可建立組合的有效紀錄');let ins=await table('meal_templates').insert({user_id:uid(),name}).select();if(ins.error)return err(ins.error);let tpl=first(ins.data);if(!tpl)return alert('常用組合建立失敗，資料庫沒有回傳結果');let rows=logs.map(l=>({user_id:uid(),template_id:tpl.id,food_id:l.food_id,qty:l.qty}));let r=await table('meal_template_items').insert(rows);if(r.error)return err(r.error);await afterMutation()}
async function addTemplateToDate(id){let d=currentDate(),items=state.templateItems.filter(i=>i.template_id===id).filter(i=>state.foods.some(f=>f.id===i.food_id));let rows=items.map(i=>({user_id:uid(),log_date:d,food_id:i.food_id,qty:i.qty}));if(!rows.length)return alert('這個常用組合內的食材已不存在，請刪除後重新建立組合');let {error}=await table('food_logs').insert(rows);if(error)return err(error);showPage('dashboard',document.querySelector('.tab[data-page="dashboard"]'));await afterMutation()}
async function deleteTemplate(id){if(!confirm('確定刪除此常用組合？'))return;setSync('刪除中');let r1=await table('meal_template_items').delete().eq('template_id',id).eq('user_id',uid());if(r1.error)return err(r1.error);let r2=await table('meal_templates').delete().eq('id',id).eq('user_id',uid());if(r2.error)return err(r2.error);state.templates=state.templates.filter(x=>x.id!==id);state.templateItems=state.templateItems.filter(x=>x.template_id!==id);renderAll();await afterMutation()}
function exportJson(){let blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='diet_cloud_v1_6_backup.json';a.click()}
async function importJson(e){let f=e.target.files[0];if(!f)return;alert('v1.6 目前保留 JSON 匯出；雲端批次匯入建議下一版加入匯入對應流程。')}
function showPage(p,el){closeSheet();document.querySelectorAll('.page').forEach(x=>x.classList.add('hide'));$('page-'+p).classList.remove('hide');document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));el.classList.add('active');renderAll();window.scrollTo(0,0)}
init();
</script>
